<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Richa ❤️</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ffe6f0,#fff7fb);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.card{
background:white;
padding:40px;
width:90%;
max-width:450px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
text-align:center;
animation:fade .6s;
}

@keyframes fade{
from{opacity:0;transform:scale(.9);}
to{opacity:1;transform:scale(1);}
}

h1{
color:#ff4d88;
}

button{
padding:14px 30px;
font-size:18px;
border:none;
border-radius:30px;
margin:10px;
cursor:pointer;
transition:.3s;
}

.yes{
background:#ff4d88;
color:white;
}

.no{
background:#ddd;
}

.yes:hover{
transform:scale(1.05);
}

.option{
display:block;
width:100%;
margin:12px 0;
background:#ffe6f0;
}

input{
padding:12px;
width:80%;
margin:10px;
font-size:18px;
border-radius:10px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<div class="card" id="card">

<h1>Hi Richa 🌸</h1>

<h2>I have something to ask 😊</h2>

<button class="yes" onclick="screen2()">Continue ❤️</button>

</div>

<script>

let card=document.getElementById("card");

function screen2(){

card.innerHTML=`

<h1>🌸</h1>

<h2>Would you like to go on our first official date before our engagement? ❤️</h2>

<button class="yes" onclick="screen3()">YES ❤️</button>

<button class="no" id="noBtn">No 🙈</button>

`;

let no=document.getElementById("noBtn");

no.addEventListener("mouseover",function(){

this.style.position="absolute";

this.style.left=Math.random()*70+"%";

this.style.top=Math.random()*70+"%";

});

}

function screen3(){

card.innerHTML=`

<h1>🥳❤️</h1>

<h2>Yay!!</h2>

<p>I was secretly hoping you'd say YES 😄</p>

<button class="yes" onclick="screen4()">Let's Plan →</button>

`;

}

function screen4(){

card.innerHTML=`

<h2>📅 When are you free?</h2>

<input type="date" id="date"><br>

<input type="time" id="time"><br>

<button class="yes" onclick="screen5()">Next ❤️</button>

`;

}

function screen5(){

card.innerHTML=`

<h2>🍽️ What are we feeling?</h2>

<button class="option" onclick="finish('Coffee ☕')">Coffee ☕</button>

<button class="option" onclick="finish('Movie 🎬')">Movie 🎬</button>

<button class="option" onclick="finish('Dinner 🍽️')">Dinner 🍽️</button>

<button class="option" onclick="finish('Dessert 🍨')">Dessert 🍨</button>

<button class="option" onclick="finish('Long Walk 🚶‍♂️')">Long Walk 🚶‍♂️</button>

`;

}

function finish(food){

let date=document.getElementById("date")?.value;

let time=document.getElementById("time")?.value;

card.innerHTML=`

<h1>❤️</h1>

<h2>Perfect!</h2>

<p>

Date: <b>${date}</b><br><br>

Time: <b>${time}</b><br><br>

Plan: <b>${food}</b>

</p>

<p>

Looking forward to spending some quality time with you 😊

</p>

<h3>~ Abhishek ❤️</h3>

`;

}

</script>

</body>

</html>
